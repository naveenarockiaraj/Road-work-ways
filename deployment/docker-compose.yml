version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: roadworks_db
      POSTGRES_USER: roadworks_user
      POSTGRES_PASSWORD: roadworks_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadworks_user -d roadworks_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../roadworks-api
      dockerfile: ../deployment/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://roadworks_user:roadworks_pass@db:5432/roadworks_db
      SECRET_KEY: change-me-in-production-use-32-random-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      FIRST_SUPERUSER_USERNAME: admin
      FIRST_SUPERUSER_PASSWORD: Admin@123
      FIRST_SUPERUSER_EMAIL: admin@roadworkways.com
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: ../roadworks-web
      dockerfile: ../deployment/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
