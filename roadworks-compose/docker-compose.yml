# ─────────────────────────────────────────────────────────────────────────────
# Road Work Ways — full stack
#
# Services:
#   postgres       PostgreSQL 15 database
#   roadworks-api  FastAPI backend
#   roadworks-web  React frontend (nginx)
#   apisix         API gateway — single entry point on :9080 (standalone YAML mode)
#
# Entry points after `docker compose up`:
#   App (via APISIX)  http://localhost:9080
#   API docs          http://localhost:9080/api/docs
#   APISIX Admin API  http://localhost:9180
#   DB (direct)       localhost:5432
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: roadworks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-roadworks_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../roadworks-db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../roadworks-db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-roadworks_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roadworks-net

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  roadworks-api:
    build:
      context: ../roadworks-api
      dockerfile: Dockerfile
    container_name: roadworks-api
    restart: unless-stopped
    env_file:
      - ../roadworks-api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-roadworks_db}
      BACKEND_CORS_ORIGINS: '["http://localhost:9080","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - roadworks-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')" || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── React frontend ──────────────────────────────────────────────────────────
  roadworks-web:
    build:
      context: ../roadworks-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9080
    container_name: roadworks-web
    restart: unless-stopped
    depends_on:
      - roadworks-api
    networks:
      - roadworks-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── APISIX API Gateway (standalone YAML mode — no etcd required) ─────────────
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: roadworks-apisix
    restart: unless-stopped
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix_conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080" # HTTP traffic (app entry point)
      - "9443:9443" # HTTPS traffic
      - "9180:9180" # Admin API
    depends_on:
      roadworks-api:
        condition: service_healthy
      roadworks-web:
        condition: service_healthy
    networks:
      - roadworks-net

volumes:
  postgres_data:

  etcd_data:

networks:
  roadworks-net:
    driver: bridge
